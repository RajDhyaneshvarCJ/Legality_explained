<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Legal Document Explainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f6f4ee;
    --surface: #fffdf9;
    --ink: #1c2420;
    --ink-soft: #565e58;
    --ink-faint: #939a93;
    --rule: #e2ded2;
    --blue: #234a78;
    --blue-hover: #1b3b61;
    --wax: #98352b;
    --wax-bg: #f9f1ee;
    --shadow: 0 1px 2px rgba(28,36,32,0.05), 0 8px 24px rgba(28,36,32,0.04);
    --serif: 'Libre Caslon Text', Georgia, serif;
    --sans: 'Public Sans', -apple-system, system-ui, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #141814; --surface: #1c211d; --ink: #ebe8df; --ink-soft: #a6aca4;
      --ink-faint: #6b716a; --rule: #2c322c; --blue: #8db0d9; --blue-hover: #a3c1e4;
      --wax: #d18a7d; --wax-bg: #281e1b;
      --shadow: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.25);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--paper); color: var(--ink);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 1.5rem;
  }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation: none !important; } }

  .card {
    width: 100%; max-width: 380px;
    background: var(--surface); border: 1px solid var(--rule); border-radius: 6px;
    box-shadow: var(--shadow); padding: 2.25rem 2rem;
    animation: fadeUp 0.5s cubic-bezier(0.2,0.7,0.3,1) both;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes sealStamp {
    0% { opacity: 0; transform: scale(1.6) rotate(-14deg); }
    60% { opacity: 1; transform: scale(0.94) rotate(2deg); }
    100% { opacity: 1; transform: scale(1) rotate(-6deg); }
  }

  .seal {
    width: 48px; height: 48px; margin: 0 auto 1.25rem; display: block;
    transform: rotate(-6deg);
    animation: sealStamp 0.6s cubic-bezier(0.2,0.8,0.3,1.1) 0.2s both;
    filter: drop-shadow(0 2px 3px rgba(28,36,32,0.18));
  }
  .seal .seal-bg { fill: var(--wax); }
  .seal .seal-ring { stroke: var(--wax-bg); }
  .seal .seal-glyph { fill: var(--wax-bg); font-family: var(--serif); font-size: 22px; }

  h1 {
    font-family: var(--serif); font-weight: 400; font-size: 21px;
    text-align: center; margin-bottom: 6px;
  }
  .sub {
    font-size: 13px; color: var(--ink-soft); text-align: center;
    margin-bottom: 1.75rem; line-height: 1.5;
  }

  label { font-size: 12px; font-weight: 600; color: var(--ink-soft); display: block; margin-bottom: 6px; }
  input[type="password"] {
    width: 100%; padding: 11px 14px; font-size: 14px;
    border: 1px solid var(--rule); border-radius: 4px;
    background: var(--surface); color: var(--ink); outline: none;
    transition: border-color 0.15s;
  }
  input[type="password"]:focus { border-color: var(--blue); }

  button {
    width: 100%; margin-top: 1rem; padding: 11px 22px;
    font-size: 14px; font-weight: 600; font-family: inherit;
    background: var(--blue); color: #fffdf9;
    border: none; border-radius: 4px; cursor: pointer;
    transition: background 0.15s, transform 0.12s;
  }
  @media (prefers-color-scheme: dark) { button { color: #141814; } }
  button:hover:not(:disabled) { background: var(--blue-hover); transform: translateY(-1px); }
  button:disabled { opacity: 0.6; cursor: wait; }

  .error {
    display: none; margin-top: 1rem; padding: 10px 12px;
    border-left: 3px solid var(--wax); background: var(--wax-bg);
    border-radius: 0 4px 4px 0; font-size: 13px; color: var(--ink);
  }
  .error.visible { display: block; }
</style>
</head>
<body>
  <form class="card" id="login-form" autocomplete="off">
    <svg class="seal" viewBox="0 0 58 58" aria-hidden="true">
      <circle class="seal-bg" cx="29" cy="29" r="28"/>
      <circle class="seal-ring" cx="29" cy="29" r="23" fill="none" stroke-width="1.4" stroke-dasharray="3 3.4"/>
      <text class="seal-glyph" x="29" y="38" text-anchor="middle">§</text>
    </svg>
    <h1>Legal Document Explainer</h1>
    <p class="sub">This is a private demo. Enter the password to continue.</p>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autofocus required />
    <button type="submit" id="submit-btn">Enter</button>
    <div class="error" id="error"></div>
  </form>

  <script>
    const form = document.getElementById('login-form');
    const btn = document.getElementById('submit-btn');
    const errorEl = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Checking…';
      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || 'Incorrect password.');
        }
        window.location.reload();
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Enter';
      }
    });
  </script>
</body>
</html>
